<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey Tyler Foundation</title>
    
    <!-- Google Fonts: Great Vibes for script, Playfair Display for elegance, Inter for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            background: #0a0a0a;
            font-family: 'Playfair Display', serif;
            color: #f8f6f2;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 10, 0.7);
        }

        .logo h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 48px;
            font-weight: 400;
            color: #d4af37; /* Gold tone */
        }

        .logo span {
            display: block;
            margin-top: -5px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* NAV */
        nav { display: flex; gap: 40px; align-items: center; }
        nav a {
            text-decoration: none;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        nav a:hover { color: #d4af37; }

        .donate {
            padding: 10px 25px;
            border: 1px solid #d4af37;
            border-radius: 50px;
            color: #d4af37;
        }
        .donate:hover { background: #d4af37; color: #000; }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        radial-gradient(circle at center, #1a1a1a 0%, #050505 70%);
        }

        .hero h2 {
            font-size: 80px;
            font-weight: 400;
            margin-bottom: 30px;
            font-style: italic;
        }

        .hero p {
            color: #cccccc;
            font-size: 22px;
            max-width: 700px;
            margin: 0 auto 50px auto;
            font-weight: 300;
        }

        .btn {
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .primary { background: #d4af37; color: #000; }
        .primary:hover { background: #fff; }

        .secondary { border: 1px solid #fff; color: #fff; }
        .secondary:hover { background: #fff; color: #000; }

        @media(max-width: 768px) {
            .hero h2 { font-size: 50px; }
            nav { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>Honey Tyler</h1>
            <span>Foundation</span>
        </div>
        <nav>
            <a href="#">Mission</a>
            <a href="#">Our Work</a>
            <a href="#">Impact</a>
            <a href="#" class="donate">Donate</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Building Hope.</h2>
            <p>The Honey Tyler Foundation exists to empower individuals and strengthen communities through compassion, advocacy, and timeless action.</p>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a href="#" class="btn primary">Our Mission</a>
                <a href="#" class="btn secondary">Get Involved</a>
            </div>
        </div>
    </section>

</body>
</html>
